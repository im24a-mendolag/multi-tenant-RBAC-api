$kind: http-request
name: Charlie tries to delete a user (Admin ❌ — no users:delete)
url: "{{baseUrl}}/tenants/{{tenantId}}/users/{{bobUserId}}"
method: DELETE
headers:
  Authorization: Bearer {{charlieToken}}
  X-Tenant-ID: "{{tenantId}}"
scripts:
  - type: afterResponse
    code: pm.test('Admin cannot delete users — only Owner can (403)', () =>
      pm.response.to.have.status(403));
    language: text/javascript
order: 2000
