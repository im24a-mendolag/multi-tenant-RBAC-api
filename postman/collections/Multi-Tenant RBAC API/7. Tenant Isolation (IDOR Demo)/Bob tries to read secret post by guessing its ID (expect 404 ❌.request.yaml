$kind: http-request
name: Bob tries to read secret post by guessing its ID (expect 404 ❌)
url: "{{baseUrl}}/posts/{{secretPostId}}"
method: GET
headers:
  Authorization: Bearer {{bobToken}}
  X-Tenant-ID: "{{tenantId}}"
scripts:
  - type: afterResponse
    code: pm.test('IDOR prevented — guessed ID returns 404', () =>
      pm.response.to.have.status(404));
    language: text/javascript
order: 3000
