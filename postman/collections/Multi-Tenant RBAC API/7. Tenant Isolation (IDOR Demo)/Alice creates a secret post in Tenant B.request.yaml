$kind: http-request
url: "{{baseUrl}}/posts"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{aliceToken}}
  X-Tenant-ID: "{{tenantBId}}"
body:
  type: text
  content: |-
    {
      "title": "Secret post in Tenant B",
      "body": "Bob should never see this."
    }
scripts:
  - type: afterResponse
    code: >-
      const json = pm.response.json();

      if (json.id) pm.collectionVariables.set('secretPostId', json.id);

      pm.test('Post created in Tenant B', () =>
      pm.response.to.have.status(201));
    language: text/javascript
order: 2000
